<script>
  // IMPORTANTE: Como você vai usar o Neon, as funções agora precisam ser assíncronas (async)
  // para esperar a resposta do servidor/banco de dados.

  async function fazerLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMsg');

    if (!username || !password) {
      errorDiv.textContent = '❌ Por favor, preencha todos os campos.';
      errorDiv.style.display = 'block';
      return;
    }

    // Aqui você chamará sua API que conecta ao Neon
    // Por enquanto, mantemos a lógica local até você subir o backend
    if (login(username, password)) {
      window.location.href = 'index.html';
    } else {
      errorDiv.textContent = '❌ Usuário ou senha não encontrados.';
      errorDiv.style.display = 'block';
    }
  }

  async function criarConta() {
    const username = document.getElementById('newUsername').value;
    const password = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    const errorDiv = document.getElementById('errorMsg');

    if (!username || !password) {
      errorDiv.textContent = '❌ Preencha todos os campos!';
      errorDiv.style.display = 'block';
      return;
    }

    if (password !== confirm) {
      errorDiv.textContent = '❌ As senhas não conferem!';
      errorDiv.style.display = 'block';
      return;
    }

    // No Neon, você faria um: await fetch('/api/register', { ... })
    if (registrarUsuario(username, password)) {
      alert('✅ Conta criada com sucesso! 💖');
      voltarLogin();
      document.getElementById('username').value = username;
    } else {
      errorDiv.textContent = '❌ Este usuário já existe ou erro no banco.';
      errorDiv.style.display = 'block';
    }
  }
</script>
